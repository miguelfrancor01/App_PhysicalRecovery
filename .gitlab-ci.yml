# texto prueba
# .gitlab-ci.yml - Versión para Runner Local uao (UAO)
stages:
  - test
  - build
  - deploy

variables:
  UV_VERSION: "0.10.9"
  PYTHON_VERSION: "3.12"
  BASE_LAYER: "trixie-slim"

  IMAGE_NAME: "adrianfvr999/app_physicalrecovery_gitlab"
  IMAGE_TAG: "grupo2-1.0"
  #N  cache en UV en lugar de todo el ambiente virtual
  UV_CACHE_DIR: ".uv-cache"
  #N Los builds sean muy rápidos
  DOCKER_BUILDKIT: 1

run_test:
  stage: test
  timeout: 2h
  tags:
    - uao-local
  image: ghcr.io/astral-sh/uv:$UV_VERSION-python$PYTHON_VERSION-$BASE_LAYER #E python:3.11-slim
  before_script:
    # 1. Instalación de dependencias de sistema (OpenGL, Video, gRPC)
    - apt-get update && apt-get install -y --no-install-recommends curl libgl1 libglib2.0-0 ffmpeg make
    # 2. Instalación de uv
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="/root/.local/bin:$PATH"
    # 3. Explicitly set UV cache dir after UV is installed
    - export UV_CACHE_DIR=".uv-cache"
    # 4. Instalación de librerías
    - uv sync --frozen
    # 5. Generación de archivos gRPC para el servidor de pose
    - uv run python -m grpc_tools.protoc -I. --python_out=. --grpc_python_out=. pose.proto
    - mv pose_pb2.py src/ && mv pose_pb2_grpc.py src/
  script:
    # 5. Ejecución de los tests
    - make test #E uv run pytest

  cache:
    key:
      files:
        - pyproject.toml
        # Es agregar uv.lock como buenas practicas
        - uv.lock
    paths:
      # Antes teniamos todo .venv que son mas o menos 30K archivos, esto afecta, de modo que es mejor
      # almacenamos la informacion de uv, nos permite procesos de guardado/ descarga rápidos.
      - .uv-cache/


build_image:
  stage: build
  timeout: 2h
  tags:
    - uao-local
  image: docker:29.3.0-cli
  services:
    - name: docker:29.3.0-dind
      alias: docker
  variables:
    DOCKER_HOST: "unix:///runner/services/docker/docker.sock"
    DOCKER_TLS_CERTDIR: ""
  before_script:
    - echo "$REGISTRY_PASS" | docker login -u "$REGISTRY_USER" --password-stdin
  script:
    # Haciendo este build estamos usando la ultima imagen, como cache en linea.
    - docker pull $IMAGE_NAME:latest || true
    - >
      docker build
      --cache-from $IMAGE_NAME:latest
      --build-arg BUILDKIT_INLINE_CACHE=1
      -t $IMAGE_NAME:$IMAGE_TAG
      -t $IMAGE_NAME:latest
      .
    # Hacemos push hacia dockerhub
    - docker push $IMAGE_NAME:$IMAGE_TAG
    - docker push $IMAGE_NAME:latest

deploy:
  stage: deploy
  timeout: 2h
  tags:
   - uao-local
  image: alpine:latest
  variables:
    DOCKER_CONTAINER: "app_physicalrecovery_gitlab"
  before_script:
   - apk add --no-cache openssh-client
   - chmod 400 $SSH_PRIVATE_KEY
  script:
  - >
    ssh -o StrictHostKeyChecking=no -i $SSH_PRIVATE_KEY root@64.23.160.162 "
    echo \"$REGISTRY_PASS\" | docker login -u \"$REGISTRY_USER\" --password-stdin &&
    docker pull $IMAGE_NAME:latest  &&
    docker rm -f $DOCKER_CONTAINER || true &&
    docker run -d --name $DOCKER_CONTAINER \
      -p 80:8501 \
      -e GRPC_SERVER_ADDRESS='127.0.0.1:50051' \
      --restart always \
      $IMAGE_NAME:latest \
      /bin/sh -c '.venv/bin/python src/grpc_server.py & .venv/bin/streamlit run app.py --server.port=8501 --server.address=0.0.0.0'"
  only:
   - main
